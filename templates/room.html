<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LongVibe — Salon {{ room_code }}</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
            gap: 8px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff00cc, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .room-info { display: flex; align-items: center; gap: 8px; }

        .room-code-badge {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: #aaa;
        }

        .copy-btn {
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .header-right { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #aaa; }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
            transition: background 0.3s;
        }

        .status-dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }

        .main { display: flex; flex: 1; }

        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 12px;
        }

        /* Conteneur vidéo JaaS (Jitsi as a Service) */
        #jitsi-container {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            background: #111;
            min-height: 350px;
        }

        .effects-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .effect-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .effect-btn:hover {
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,0,204,0.3);
        }

        .effect-btn:active { transform: scale(0.95); }

        .chat-section {
            width: 260px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.06);
        }

        .chat-header {
            padding: 12px 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 400px;
        }

        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .chat-msg {
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 7px 9px;
            font-size: 0.8rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            word-break: break-word;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .chat-msg .msg-author {
            font-weight: 700;
            color: #ff00cc;
            margin-bottom: 2px;
            font-size: 0.75rem;
        }

        .chat-msg.system {
            background: rgba(0,255,136,0.06);
            border: 1px solid rgba(0,255,136,0.1);
            color: #00ff88;
            font-size: 0.75rem;
            text-align: center;
        }

        .chat-input-area {
            padding: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 7px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-size: 0.82rem;
            font-family: 'Poppins', sans-serif;
        }

        .chat-input:focus { outline: none; border-color: #ff00cc; }
        .chat-input::placeholder { color: #444; }

        .send-btn {
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .main { flex-direction: column; }
            .video-section { padding: 10px; gap: 10px; }
            #jitsi-container { min-height: unset; height: 240px; flex: unset; }
            .effect-btn { padding: 9px 11px; font-size: 0.78rem; flex: 1; min-width: calc(33% - 8px); text-align: center; }
            .chat-section { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); }
            .chat-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
            .chat-header::after { content: '▼'; font-size: 0.7rem; color: #555; transition: transform 0.2s; }
            .chat-section.collapsed .chat-messages,
            .chat-section.collapsed .chat-input-area { display: none; }
            .chat-section.collapsed .chat-header::after { transform: rotate(-90deg); }
            .chat-messages { max-height: 160px; }
            .header-right .username { display: none; }
        }

        #flash-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 999;
            transition: opacity 0.1s ease;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            white-space: nowrap;
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">LongVibe</a>

        <div class="room-info">
            <span class="room-code-badge">🔑 {{ room_code }}</span>
            <button class="copy-btn" onclick="copyLink()">📋 Copier le lien</button>
        </div>

        <div class="header-right">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connexion...</span>
            <span class="username">👤 {{ current_user.username }}</span>
        </div>
    </header>

    <div class="main">

        <div class="video-section">
            <!-- Vidéo JaaS intégrée directement dans la page -->
            <div id="jitsi-container"></div>

            <div class="effects-bar">
                <button class="effect-btn" onclick="sendEffect('confetti')">🎊 Confettis</button>
                <button class="effect-btn" onclick="sendEffect('fireworks')">🎆 Artifice</button>
                <button class="effect-btn" onclick="sendEffect('flash')">💡 Flash</button>
                <button class="effect-btn" onclick="sendEffect('rain')">🌧️ Pluie</button>
            </div>
        </div>

        <div class="chat-section collapsed" id="chat-section">
            <div class="chat-header" onclick="toggleChat()">💬 Chat du salon</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input
                    type="text"
                    class="chat-input"
                    id="chat-input"
                    placeholder="Envoie un message..."
                    maxlength="200"
                    onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <div id="flash-overlay"></div>
    <div id="toast"></div>

    <!-- API JaaS (Jitsi as a Service) -->
    <script src="https://8x8.vc/vpaas-magic-cookie-533f0c3d9a524a0991d12431ea05cbb8/external_api.js" async></script>

    <script>
        const roomCode = "{{ room_code }}";
        const username = "{{ current_user.username }}";

        // Initialiser la vidéo JaaS dans le conteneur, une fois le script chargé
        function initJitsi() {
            if (typeof JitsiMeetExternalAPI === 'undefined') {
                setTimeout(initJitsi, 200);
                return;
            }
            new JitsiMeetExternalAPI("8x8.vc", {
                roomName: "vpaas-magic-cookie-533f0c3d9a524a0991d12431ea05cbb8/LongVibe-" + roomCode,
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: username },
                width: '100%',
                height: '100%',
                configOverwrite: {
                    prejoinPageEnabled: false,
                },
            });
        }
        initJitsi();

        function toggleChat() {
            if (window.innerWidth <= 700) {
                document.getElementById('chat-section').classList.toggle('collapsed');
            }
        }

        function copyLink() {
            const url = window.location.origin + '/salon/{{ room_code }}';
            navigator.clipboard.writeText(url).catch(() => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            });
            showToast("🔗 Lien copié !");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        const socket = io();

        socket.on('connect', () => {
            socket.emit('join', { room: roomCode, username: username });
            document.getElementById('status-dot').classList.add('connected');
            document.getElementById('status-text').innerText = 'En ligne';
        });

        socket.on('disconnect', () => {
            document.getElementById('status-dot').classList.remove('connected');
            document.getElementById('status-text').innerText = 'Déconnecté';
        });

        function sendEffect(effectName) {
            socket.emit('trigger_effect', { room: roomCode, effect: effectName });
        }

        socket.on('play_effect', (data) => { playEffect(data.effect); });

        function playEffect(effect) {
            switch (effect) {
                case 'confetti':
                    confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });
                    break;
                case 'fireworks':
                    launchFireworks();
                    break;
                case 'flash':
                    flashScreen();
                    break;
                case 'rain':
                    confetti({
                        particleCount: 200,
                        spread: 160,
                        origin: { y: 0 },
                        colors: ['#ff00cc', '#00ffcc', '#3333ff', '#ffff00', '#ff6600']
                    });
                    break;
            }
        }

        function launchFireworks() {
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        }

        function showEmojiBurst(emoji) {
            for (let i = 0; i < 12; i++) {
                const span = document.createElement('span');
                span.innerText = emoji;
                span.style.cssText = `position:fixed;font-size:2rem;left:${Math.random()*100}vw;top:100vh;transition:transform 2s ease-out,opacity 2s ease-out;z-index:1000;pointer-events:none;`;
                document.body.appendChild(span);
                requestAnimationFrame(() => {
                    span.style.transform = `translateY(-${110 + Math.random()*20}vh) rotate(${Math.random()*360}deg)`;
                    span.style.opacity = '0';
                });
                setTimeout(() => span.remove(), 2100);
            }
        }

        function flashScreen() {
            const overlay = document.getElementById('flash-overlay');
            overlay.style.background = 'radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,0,255,0.4))';
            overlay.style.opacity = '1';
            setTimeout(() => overlay.style.opacity = '0', 150);
        }

        function addMessage(author, text, isSystem = false) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = isSystem ? 'chat-msg system' : 'chat-msg';
            if (!isSystem) {
                div.innerHTML = `<div class="msg-author">${author}</div><div>${text}</div>`;
            } else {
                div.innerText = text;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            socket.emit('chat_message', { room: roomCode, username: username, text: text });
            input.value = '';
        }

        function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }

        socket.on('new_message', (data) => { addMessage(data.username, data.text); });
        socket.on('user_joined', (data) => { addMessage('', `${data.username} a rejoint la fête 🎉`, true); });
    </script>

</body>
</html>
