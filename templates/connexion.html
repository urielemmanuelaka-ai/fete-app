<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-box {
            background: rgba(255,255,255,0.06);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px #ff00ff;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 5px;
        }

        .flash {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff5555;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .link a {
            color: #00ffcc;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>Connexion</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Se connecter</button>
        </form>

        <div class="link">
            Pas encore de compte ? <a href="{{ url_for('inscription') }}">Inscris-toi</a>
        </div>
    </div>
</body>
</html>
