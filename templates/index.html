<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon de Fête</title>

    <!-- Librairie pour l'effet confettis -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <!-- Client Socket.IO (doit correspondre à la version de flask-socketio côté serveur) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin: 20px 0;
            font-size: 2rem;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            letter-spacing: 2px;
        }

        #jitsi-container {
            width: 100%;
            max-width: 1000px;
            height: 500px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.3);
            margin-bottom: 30px;
        }

        #jitsi-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .effects-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .effect-btn {
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 204, 0.4);
        }

        .effect-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 0, 204, 0.6);
        }

        .effect-btn:active {
            transform: scale(0.95);
        }

        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Overlay plein écran pour le flash lumineux */
        #flash-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 999;
            transition: opacity 0.1s ease;
        }
    </style>
</head>
<body>

    <h1>🎉 Salon de Fête</h1>

    <!-- Espace vidéo : Jitsi Meet intégré gratuitement -->
    <div id="jitsi-container">
        <iframe
            src="https://meet.jit.si/MaFeteEntreAmis-Demo"
            allow="camera; microphone; fullscreen; display-capture; autoplay">
        </iframe>
    </div>

    <!-- Boutons pour déclencher les effets -->
    <div class="effects-bar">
        <button class="effect-btn" onclick="sendEffect('confetti')">🎊 Confettis</button>
        <button class="effect-btn" onclick="sendEffect('fireworks')">🎆 Feu d'artifice</button>
        <button class="effect-btn" onclick="sendEffect('drink')">🥂 Tournée générale</button>
        <button class="effect-btn" onclick="sendEffect('flash')">💡 Flash lumineux</button>
    </div>

    <p id="status">Connexion au serveur...</p>

    <!-- Overlay pour l'effet flash -->
    <div id="flash-overlay"></div>

    <script>
        // Connexion au serveur Flask-SocketIO
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('status').innerText = "✅ Connecté au salon !";
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "❌ Déconnecté du serveur.";
        });

        // Quand on clique sur un bouton, on envoie l'effet au serveur
        function sendEffect(effectName) {
            socket.emit('trigger_effect', { effect: effectName });
        }

        // Quand le serveur renvoie un effet, on le joue chez TOUT LE MONDE
        socket.on('play_effect', (data) => {
            playEffect(data.effect);
        });

        function playEffect(effect) {
            switch (effect) {
                case 'confetti':
                    confetti({
                        particleCount: 150,
                        spread: 90,
                        origin: { y: 0.6 }
                    });
                    break;

                case 'fireworks':
                    launchFireworks();
                    break;

                case 'drink':
                    showEmojiBurst('🥂');
                    break;

                case 'flash':
                    flashScreen();
                    break;
            }
        }

        function launchFireworks() {
            const duration = 2000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff00ff', '#00ffff', '#ffff00']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff00ff', '#00ffff', '#ffff00']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }

        function showEmojiBurst(emoji) {
            for (let i = 0; i < 12; i++) {
                const span = document.createElement('span');
                span.innerText = emoji;
                span.style.position = 'fixed';
                span.style.fontSize = '2.5rem';
                span.style.left = Math.random() * 100 + 'vw';
                span.style.top = '100vh';
                span.style.transition = 'transform 2s ease-out, opacity 2s ease-out';
                span.style.zIndex = 1000;
                document.body.appendChild(span);

                // petite pause avant l'animation pour que la transition s'applique
                requestAnimationFrame(() => {
                    span.style.transform = `translateY(-${100 + Math.random() * 20}vh) rotate(${Math.random() * 360}deg)`;
                    span.style.opacity = '0';
                });

                setTimeout(() => span.remove(), 2100);
            }
        }

        function flashScreen() {
            const overlay = document.getElementById('flash-overlay');
            overlay.style.background = 'radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,0,255,0.4))';
            overlay.style.opacity = '1';
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 150);
        }
    </script>

</body>
</html>
