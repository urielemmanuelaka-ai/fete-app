<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LongVibe — Inscription</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
        }

        .orb1 { width: 350px; height: 350px; background: #ff00cc; top: -100px; left: -100px; }
        .orb2 { width: 250px; height: 250px; background: #3333ff; bottom: -50px; right: -50px; }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff00cc, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-decoration: none;
        }

        .form-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 5;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #ff00cc;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            margin-top: 5px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,0,204,0.4);
        }

        .flash {
            background: rgba(255,0,0,0.15);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6666;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #555;
        }

        .link a { color: #ff00cc; text-decoration: none; font-weight: 600; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <a href="/" class="logo">LongVibe</a>

    <div class="form-box">
        <h1>Créer un compte</h1>
        <p class="subtitle">Rejoins la fête en quelques secondes</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" placeholder="ex: uriel_vibe" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="ton@email.com" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <button type="submit">Créer mon compte 🎉</button>
        </form>

        <div class="link">
            Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a>
        </div>
    </div>

</body>
</html>
